name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.24.3
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # Fetch the entire commit history so the scan below can inspect
          # every commit, not just the most recent push.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$url" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan full git history for secrets
        run: |
          # --log-opts=--all forces gitleaks to walk EVERY commit on all
          # refs rather than the default single-commit (delta) scan, so
          # secrets that were committed and later removed are still found.
          gitleaks detect --source . --config .gitleaks.toml --log-opts=--all --redact --verbose
